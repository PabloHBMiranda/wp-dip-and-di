services:
  nginx:
    container_name: dip-di-nginx
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./public:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - wordpress

  wordpress:
    container_name: dip-di-wordpress
    image: wordpress:php8.3-fpm
    user: "1000:1000"
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DEBUG: "1"
    volumes:
      - ./vendor:/var/www/vendor:ro                     # autoloader acessível em /var/www/vendor/
      - ./public:/var/www/public:ro                     # resolve vendor/../../public/... do classloader
      - ./public:/var/www/html                          # WordPress core (webroot)

  mariadb:
    container_name: dip-di-mariadb
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wp
      MARIADB_PASSWORD: wp
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - ./data/mariadb:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

